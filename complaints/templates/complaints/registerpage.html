<!DOCTYPE html>
<html>
<head>
    <title>Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow-x: hidden;
        }

        .bg-image {
            background: url('https://thumbs.dreamstime.com/b/skyscrapers-hyderabad-india-august-fifth-largest-contributor-city-to-india-s-gdp-us-billion-august-india-48811585.jpg') 
                        no-repeat center center/cover;
            width: 100%;
            height: 100%;
            position: fixed; 
            top: 0;
            left: 0;
            z-index: -2;
        }

        .overlay {
            background-color: rgba(0, 0, 0, 0.5);
            width: 100%;
            height: 100%;
            position: fixed; /* Changed from absolute to fixed */
            top: 0;
            left: 0;
            z-index: -1;
        }

        .card-register {
            width: 500px;
            max-width: 90%;
            background-color: white;
            padding: 20px;
            margin: 0 auto; /* Removed vertical margin */
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            border-radius: 10px;
        }

        .error-msg {
            color: red;
            font-size: 0.9rem;
            margin-bottom: 5px;
            text-align: center;
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        h5 {
            text-align: center;
            margin-top: 15px;
        }

        h5 a {
            margin-left: 5px;
            color: #0d6efd;
            font-weight: bold;
            text-decoration: none;
        }

        h5 a:hover {
            text-decoration: underline;
        }

        .register-wrapper {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        @media (max-width: 768px) {
    .form { width: 400px; }
}
@media (max-width: 480px) {
    .form { width: 90%; padding: 5px; }
}
        }
    </style>
</head>
<body>
    <div class="bg-image"></div>
    <div class="overlay"></div>

    <!-- Changed the container structure -->
    <div class="register-wrapper">
        <div class="card-register">
            <!-- SIMPLE ERROR MESSAGES -->
            {% if errors %}
                {% for err in errors %}
                    <div class="error-msg">{{ err }}</div>
                {% endfor %}
            {% endif %}

            <form method="POST">
                {% csrf_token %}
                <h2>Register Page</h2>
                <label class="mt-3">Username</label>
                <input type="text" name="username" class="form-control mb-3" required>

                <label>Email</label>
                <input type="email" name="email" class="form-control mb-3" required>

                <label>Phone Number</label>
                <input type="number" name="number" class="form-control mb-3">

                <label>Password</label>
                <input type="password" name="password" class="form-control mb-3" required>

                <label>Confirm Password</label>
                <input type="password" name="confirmpassword" class="form-control mb-3" required>

                <button type="submit" class="btn btn-success w-100 mt-2 mb-3">Register</button>
            </form>

            <h5>
                Already have an account?
                <a href="{% url 'login_view' %}">Login here</a>
            </h5>
        </div>
    </div>
</body>
</html>
