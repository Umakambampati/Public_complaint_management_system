<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
        }

        .bg-image {
            background: url('https://thumbs.dreamstime.com/b/skyscrapers-hyderabad-india-august-fifth-largest-contributor-city-to-india-s-gdp-us-billion-august-india-48811585.jpg') 
                        no-repeat center center/cover;
            width: 100%;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
            z-index: -2;
        }

        .overlay {
            background-color: rgba(0, 0, 0, 0.5);
            width: 100%;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
            z-index: -1;
        }
         .card{
            height:auto;
            width:550px;
            background-color:white;
            padding:20px;
            margin-top:100px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
 
        }
    </style>
</head>

<body>
    <div class="bg-image"></div>
    <div class="overlay"></div>
<div class="d-flex justify-content-center align-items-center" >
    <div class="card">
    <h3 class="text-center mb-4">Login</h3>

    <form method="POST">
        {% csrf_token %}

        <label>Username</label>
        <input type="text" name="username" class="form-control mb-3" required>

        <label>Password</label>
        <input type="password" name="password" class="form-control mb-3" required>

        <button type="submit" class="btn btn-success w-100">Login</button>
    </form>
    {% if error %}
<div class="alert alert-danger text-center mt-3"  >{{ error }}</div>
{% endif %}
<h5 class="text-center mt-3">
    Don't have an account?
    <a href="{% url 'register' %}" class="text-primary fw-bold">Register</a>
</h5>
</div>
</div>

</body>
</html>
